const app      = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth     = getAuth(app);

window.__firebase = { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged, ref, onValue, set, remove };

onAuthStateChanged(auth, user => {
  const authEl = document.getElementById('auth-screen');
  const loadEl = document.getElementById('app-loading');
  const rootEl = document.getElementById('root');
  if (user) {
    authEl.style.display = 'none';

  } else {
    loadEl.style.display = 'none';
    rootEl.style.display = 'none';
    authEl.style.display = 'flex';
  }
});

document.getElementById('google-signin-btn').addEventListener('click', async () => {
  const errEl = document.getElementById('auth-error');

   ============================================================ */
function getSundays(y, m) {
  const out = [], d = new Date(y, m, 1);
  while (d.getDay() !== 0) d.setDate(d.getDate() + 1);
  while (d.getMonth() === m) { out.push(new Date(d)); d.setDate(d.getDate() + 7); }
  return out;
}
const fmtDate = d => d.toISOString().split('T')[0];

/* ============================================================

const { db, ref, onValue, set, remove, auth, signOut } = window.__firebase;
const epsRef = uid => ref(db, `users/${uid}/fn_episodes`);
const epRef  = (uid, id) => ref(db, `users/${uid}/fn_episodes/${id}`);

function subscribeEps(uid, cb) {
  return onValue(epsRef(uid), snap => {
    const data = snap.val();
    cb(data ? Object.values(data) : []);
  });
}
async function saveAllEps(uid, eps) {
  const obj = {};
  eps.forEach(e => { obj[e.id] = e; });
  await set(epsRef(uid), obj);
}

function FNPlanner({ user }) {
  const [episodes,   setEpisodes]   = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [view,       setView]       = useState('calendar');
  const [saveStatus, setSaveStatus] = useState('');

  // Builder
  const [editId,      setEditId]      = useState(null);
  const [fTitle,      setFTitle]      = useState('');
  const [fDate,       setFDate]       = useState('');
  const [fType,       setFType]       = useState(null);
  const [fGuest,      setFGuest]      = useState('');
  const [fDefendant,  setFDefendant]  = useState('');
  const [fJudge,      setFJudge]      = useState('');
  const [fSpotlight,  setFSpotlight]  = useState('');
  const [fNotes,      setFNotes]      = useState('');
  const [segNotes,    setSegNotes]    = useState({});

  // Calendar
  const [curYear,  setCurYear]  = useState(2026);
  const [curMonth, setCurMonth] = useState(0);

  // Modals
  const [viewModal,      setViewModal]  = useState(null);
  const [segModal,       setSegModal]   = useState(false);
  const [localSegNotes,  setLocalSN]    = useState({});

  // Broadcast mode
  const [bcast,     setBcast]    = useState(false);
  const [bEp,       setBEp]      = useState(null);
  const [bIdx,      setBIdx]     = useState(0);
  const [bElap,     setBElap]    = useState(0);
  const [bRun,      setBRun]     = useState(false);
  const [showElap,  setShowElap] = useState(0);
  const bTimerRef  = useRef(null);
  const SHOW_SECS  = 85 * 60;

  const saveTimer = useRef(null);
  const firstLoad = useRef(true);

  useEffect(() => {
    setLoading(true);
    const unsub = subscribeEps(user.uid, eps => {
      setEpisodes(eps);
      setLoading(false);
      firstLoad.current = false;
    });
    return () => unsub();
  }, [user.uid]);

  const scheduleSave = useCallback((eps) => {
    if (firstLoad.current) return;
    setSaveStatus('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await saveAllEps(user.uid, eps);
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus(''), 2200);
      } catch(e) { setSaveStatus('error'); }
    }, 800);
  }, [user.uid]);

  // ── Broadcast timer ──
  useEffect(() => {
    if (bRun) {
      bTimerRef.current = setInterval(() => {
        setBElap(e => e + 1);
        setShowElap(e => e + 1);
      }, 1000);
    } else {

            <div className="bible-card">
              <div className="bible-card-head"><div className="bible-card-title">Episode Types</div></div>

                <div className="ep-type-grid">
                  {[
                    {col:'#3B9E6A',tag:'Type A',name:'Interview',sub:'Pro-25Flow centrepiece',segs:[['es-f','Opening & intro'],['es-f','Host conversation'],['es-m','On The Loop'],['es-a','On The Scene'],['es-a','On The Street'],['es-a','Pro-25Flow'],['es-f','Review'],['es-f','Outro & close']]},

        const segMins  = Math.round(SHOW_SECS / 60 / segs.length);
        const segSecs  = segMins * 60;
        const remaining = Math.max(0, segSecs - bElap);
        const pct      = segSecs > 0 ? Math.min(100, (bElap / segSecs) * 100) : 0;
        const urgent   = remaining <= 60 && remaining > 0 && bRun;
        const showLeft = Math.max(0, SHOW_SECS - showElap);
        const mm = s => String(Math.floor(s/60)).padStart(2,'0');
        const ss = s => String(s%60).padStart(2,'0');
        const fmt = s => `${mm(s)}:${ss(s)}`;
        const nextSeg  = segs[bIdx + 1];
        const barColor = segType==='music' ? 'var(--green)' : segType==='anchor' ? '#534AB7' : segType==='court' ? 'var(--rust)' : segType==='opt' ? 'rgba(42,31,14,0.3)' : 'var(--gold)';
        return (
          <div className="bcast">
            {/* On Air */}
            <div className="bcast-onair">
              <div className="bcast-dot"/>
              ON AIR &mdash; SHINE FM 99.9
            </div>

            {/* Hosts */}
            <div className="bcast-hosts">with Lema &amp; Ruthie</div>

            {/* Segment progress dots */}
            <div className="bcast-seg-dots">
              {segs.map((_,i) => (
                <div key={i} className={`bcast-sdot${i<bIdx?' done':i===bIdx?' active':''}`}
                  style={i===bIdx ? {background:barColor, borderColor:barColor} : {}}/>
              ))}
            </div>

            {/* Segment identity */}
            <div style={{textAlign:'center'}}>
              <div className="bcast-seg-id">
                {String(bIdx+1).padStart(2,'0')} / {String(segs.length).padStart(2,'0')}
              </div>
              <div className={`bcast-seg-name t-${segType}`}>
                {seg.n || ''}
              </div>
              {seg.note && <div className="bcast-guest">{seg.note}</div>}
            </div>

            {/* Big timer */}
            <div className={`bcast-timer${urgent?' urgent':''}`}>
              {fmt(remaining)}
            </div>

            {/* Segment progress bar */}
            <div className="bcast-bar-wrap">
              <div className="bcast-bar-fill" style={{width:`${pct}%`, background: urgent ? 'var(--rust)' : barColor}}/>
            </div>

            {/* Next up */}
            {nextSeg ? (
              <div className="bcast-next">Next &rarr; {nextSeg.n}</div>
            ) : (
              <div className="bcast-next" style={{color:'var(--rust)'}}>Final segment</div>
            )}

            {/* Show clock */}
            <div className="bcast-show-timer">Show time remaining: {fmt(showLeft)} / {fmt(SHOW_SECS)}</div>

            {/* Controls */}
            <div className="bcast-controls">
              <button className="bcast-btn bcast-btn-exit" onClick={()=>{setBcast(false);setBRun(false);}}>EXIT</button>
              <button className="bcast-btn bcast-btn-play" onClick={()=>setBRun(r=>!r)}>
                {bRun ? '&#9646;&#9646; PAUSE' : '&#9654; START'}
              </button>
              <button className="bcast-btn bcast-btn-next" onClick={nextSegment}>NEXT &rarr;</button>
            </div>
          </div>
        );
      })()}
    </>
  );
}

/* ── MOUNT ── */
window.addEventListener('firebase-ready', ({ detail: { user } }) => {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function App() {
    const [currentUser, setCurrentUser] = React.useState(user);
    window.__setFBUser = setCurrentUser;
    return <FNPlanner user={currentUser}/>;
  }
  root.render(<App/>);
});
</script>
</body>
</html>
